<!DOCTYPE html>
<html>
<head>
  <title>Debug Code Block Enter</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
    }
    
    .debug {
      background: #f0f0f0;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    
    .code-block {
      font-family: monospace;
      background: #1a1a1a;
      color: #f0f0f0;
      padding: 15px;
      border-radius: 6px;
      white-space: pre-wrap;
      margin: 15px 0;
      line-height: 1.4;
      min-height: 100px;
      border: 2px solid #666;
    }
    
    .log {
      background: #333;
      color: #0f0;
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Debug Code Block Enter Behavior</h1>
  
  <div class="debug">
    <h3>Test Instructions:</h3>
    <p>1. Click in the code block below</p>
    <p>2. Press Enter in the middle of a line</p>
    <p>3. Check the debug output</p>
  </div>
  
  <div id="code-block" class="code-block" contenteditable="true">```javascript
function hello() {
  console.log("Hello");
  // Press Enter here: between hello() and {
  console.log("World");
}
```</div>
  
  <button onclick="logState()">Log Current State</button>
  <button onclick="clearLog()">Clear Log</button>
  
  <h3>Debug Log:</h3>
  <div id="log" class="log"></div>
  
  <script>
    const logElement = document.getElementById('log');
    const codeBlock = document.getElementById('code-block');
    
    function log(msg) {
      const timestamp = new Date().toLocaleTimeString();
      logElement.innerHTML += `[${timestamp}] ${msg}\n`;
      logElement.scrollTop = logElement.scrollHeight;
    }
    
    function clearLog() {
      logElement.innerHTML = '';
    }
    
    function getCursorPosition(element) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return 0;
      
      const range = sel.getRangeAt(0);
      const preRange = range.cloneRange();
      preRange.selectNodeContents(element);
      preRange.setEnd(range.endContainer, range.endOffset);
      
      return preRange.toString().length;
    }
    
    function logState() {
      const text = codeBlock.textContent || '';
      const cursorPos = getCursorPosition(codeBlock);
      
      log(`Text length: ${text.length}`);
      log(`Cursor position: ${cursorPos}`);
      log(`Text before cursor: "${text.slice(0, cursorPos)}"`);
      log(`Text after cursor: "${text.slice(cursorPos)}"`);
      
      // Show lines
      const lines = text.split('\n');
      log(`Total lines: ${lines.length}`);
      lines.forEach((line, i) => {
        log(`Line ${i}: "${line}" (length: ${line.length})`);
      });
      
      // Show current line info
      const before = text.slice(0, cursorPos);
      const beforeLines = before.split('\n');
      const currentLine = beforeLines[beforeLines.length - 1];
      log(`Current line: "${currentLine}"`);
      log(`Current line starts with \`\`\`? ${currentLine.startsWith('```')}`);
      
      // Calculate what would happen on Enter
      const match = currentLine.match(/^(\s*)/);
      const indentation = match ? match[1] : '';
      log(`Indentation on current line: "${indentation}" (length: ${indentation.length})`);
      
      const newText = before + "\n" + indentation + text.slice(cursorPos);
      const cursorOffset = before.length + 1 + indentation.length;
      log(`On Enter, cursor would go to position: ${cursorOffset}`);
    }
    
    // Add event listeners
    codeBlock.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        log('=== ENTER KEY PRESSED ===');
        
        const text = codeBlock.textContent || '';
        const cursorPos = getCursorPosition(codeBlock);
        const before = text.slice(0, cursorPos);
        const after = text.slice(cursorPos);
        
        log(`Before: "${before}" (length: ${before.length})`);
        log(`After: "${after}"`);
        
        // Simulate what the plugin would do
        const lines = before.split('\n');
        const currentLine = lines[lines.length - 1];
        let indentation = '';
        
        if (lines.length > 1 && !currentLine.startsWith('```')) {
          const match = currentLine.match(/^(\s*)/);
          indentation = match ? match[1] : '';
        }
        
        log(`Current line: "${currentLine}"`);
        log(`Indentation: "${indentation}" (length: ${indentation.length})`);
        
        const newText = before + "\n" + indentation + after;
        const cursorOffset = before.length + 1 + indentation.length;
        
        log(`New text length: ${newText.length}`);
        log(`Cursor offset: ${cursorOffset}`);
        
        // Apply the change
        codeBlock.textContent = newText;
        
        // Set cursor position
        setTimeout(() => {
          const sel = window.getSelection();
          const range = document.createRange();
          
          // Walk through text nodes to find position
          const walker = document.createTreeWalker(codeBlock, NodeFilter.SHOW_TEXT, null);
          let currentOffset = 0;
          let node = null;
          
          while ((node = walker.nextNode())) {
            const nodeLength = node.textContent.length;
            if (currentOffset + nodeLength >= cursorOffset) {
              range.setStart(node, cursorOffset - currentOffset);
              range.collapse(true);
              sel.removeAllRanges();
              sel.addRange(range);
              break;
            }
            currentOffset += nodeLength;
          }
          
          log(`Cursor set to position: ${cursorOffset}`);
          log(`Actual cursor position after set: ${getCursorPosition(codeBlock)}`);
        }, 0);
      }
    });
    
    codeBlock.addEventListener('click', () => {
      log('Code block clicked');
      logState();
    });
    
    codeBlock.addEventListener('input', () => {
      log('Input event fired');
    });
    
    // Initial log
    log('Page loaded. Click in the code block and press Enter.');
  </script>
</body>
</html>
